---
- name: 'Install common utility software'
  homebrew:
    name: '{{ item }}'
    state: 'present'
  with_items:
    - 'shpotify'

- name: 'Ensure "~/bin" folder is present'
  file:
    path: '~/bin'
    state: 'directory'

- name: 'Copy scripts'
  copy:
    src: './'
    mode: '0744'
    dest: '~/bin'
